name: Update GitHub Stats Cards

on:
  # schedule:
  #   - cron: "30 16 * * 0"  # Every Sunday at 10:00 PM IST (16:30 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=finallyRaunak&show_icons=true&include_all_commits=true&count_private=true&hide_border=true
          path: img/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=finallyRaunak&layout=compact&hide_border=true
          path: img/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/stats.svg img/top-langs.svg
          git commit -m "chore: update stats cards" || exit 0
          git push
